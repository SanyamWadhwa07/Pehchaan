openapi: 3.0.3
info:
  title: Pehchaan API
  description: |
    Integration-ready API surface for Pehchaan offline workforce authentication.
    Designed for future NHAI DataLink 3.0 / NHAI portal integration.
    Owner: Maulik — complete by Day 3.
  version: 0.1.0

servers:
  - url: https://your-project.supabase.co/functions/v1
    description: Supabase Edge Functions

components:
  schemas:
    PendingAuthSession:
      description: |
        Client-side only (Zustand `pendingAuthStore`). Not an HTTP endpoint.
        Supervisor confirmation reads this shape after device auth completes.
      type: object
      required:
        - status
        - workerId
        - workerName
        - siteId
        - deviceId
        - confidence
        - authTier
      properties:
        status:
          type: string
          enum: [awaiting_confirmation, confirmed, rejected]
        workerId:
          type: string
          format: uuid
        workerName:
          type: string
        thumbnailBase64:
          type: string
        siteId:
          type: string
          format: uuid
        deviceId:
          type: string
          format: uuid
        confidence:
          type: number
        authTier:
          type: string
          enum: [high, medium, low]
        requiresSupervisorFlag:
          type: boolean

  securitySchemes:
    AdminJWT:
      type: http
      scheme: bearer
      description: Supabase Admin JWT (service_role key — server-side only)
    SupervisorJWT:
      type: http
      scheme: bearer
      description: Supabase Supervisor JWT (scoped to site_id)
    DeviceJWT:
      type: http
      scheme: bearer
      description: Device-scoped JWT (site_id claim required)

paths:

  /create-site-package:
    post:
      summary: Build encrypted site package
      description: |
        Fetches workers for a site, encrypts embeddings with AES-256-GCM,
        packs zip + thumbnails, uploads to Supabase Storage,
        and returns signed URL + wrapped AES key.
      security:
        - AdminJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [site_id]
              properties:
                site_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Package built successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  package_version:
                    type: integer
                  signed_url:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
        # TODO (Maulik — Day 3): Add error response schemas

  /download-site-package:
    get:
      summary: Download site package
      description: Validates supervisor credential and returns package + per-site AES key.
      security:
        - SupervisorJWT: []
      parameters:
        - name: site_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: version
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Package URL and key returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  signed_url:
                    type: string
                  wrapped_key:
                    type: string
                    description: AES key wrapped with device public key

  /register-worker:
    post:
      summary: Register a new worker
      description: |
        Creates worker record, triggers embedding generation,
        queues site package rebuild. Accepts both Admin JWT (central registration)
        and Device JWT (field registration via supervisor app).
      security:
        - AdminJWT: []
        - DeviceJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, role, site_id]
              properties:
                name:
                  type: string
                role:
                  type: string
                  description: Trade / contractor role, e.g. Mason, Electrician
                site_id:
                  type: string
                  format: uuid
                aadhaar_ref_hash:
                  type: string
                  description: SHA-256 hash of Aadhaar — raw number never stored
                language_preference:
                  type: string
                  enum: [en, hi]
                  default: en
      responses:
        '201':
          description: Worker registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  worker_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [registered, pending_embedding]

  /sync-revocations:
    post:
      summary: Pull worker revocations for a device site
      description: |
        Device JWT only. Returns `revocation_log` entries and `workers.revoked_at` changes strictly after `since`.
        When `device_id` is sent and `since` is omitted, the Edge function uses `devices.last_sync_at` for `since`
        (epoch if null), then patches **`devices.last_sync_at`**, optional **`trust_score`** / **`app_version`** (N5),
        after a successful query (N4 watermark).
      security:
        - DeviceJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [site_id]
              properties:
                site_id:
                  type: string
                  format: uuid
                  description: Must match JWT `app_metadata.site_id`.
                since:
                  type: string
                  format: date-time
                  description: Optional lower bound (ISO). Omitted with `device_id` → server uses `devices.last_sync_at`.
                device_id:
                  type: string
                  format: uuid
                  description: Optional; enables server-side `since` default + device row patch after success.
                trust_score:
                  type: number
                  minimum: 0
                  maximum: 1
                  description: Optional device-reported trust (N5); applied with `last_sync_at` when `device_id` set.
                app_version:
                  type: string
                  maxLength: 64
                  description: Optional app semver for `devices.app_version` (N5).
      responses:
        '200':
          description: Revocations since watermark
          content:
            application/json:
              schema:
                type: object
                properties:
                  revocations:
                    type: array
                    items:
                      type: object
                      required: [worker_id, revoked_at]
                      properties:
                        worker_id:
                          type: string
                          format: uuid
                        revoked_at:
                          type: string
                          format: date-time
                        reason:
                          type: string

  /device-revoke:
    post:
      summary: Revoke a device
      description: Invalidates device JWT. Encrypted package becomes inaccessible.
      security:
        - AdminJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_id]
              properties:
                device_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Device revoked

  /registration-requests:
    post:
      summary: Insert field registration request (Supabase dev)
      description: |
        Field supervisor app queues `pending_registration` locally, then sync inserts
        via PostgREST (`registrationRepository.insertRegistrationRequest`).
        Maps to `pushPendingRegistrationOutbox` — not a standalone Edge route in dev.
      security:
        - SupervisorJWT: []
        - DeviceJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worker_name, role, site_id]
              properties:
                worker_name:
                  type: string
                role:
                  type: string
                site_id:
                  type: string
                  format: uuid
                aadhaar_ref_hash:
                  type: string
                submitted_by:
                  type: string
                  format: uuid
                status:
                  type: string
                  enum: [pending_registration, pending]
                captured_angles_json:
                  type: object
                  description: |
                    Per-angle face data (inline base64 or `{ref:storage,bucket,path}` after large-payload upload).
                    Maps to `registration_requests.captured_angles_json` (jsonb).
                  additionalProperties: true
      responses:
        '201':
          description: Registration request created

  /attendance/batch:
    post:
      summary: Batch upload attendance records (Supabase dev)
      description: |
        Device JWT inserts rows into `attendance_records` with `sync_status: pending`.
        Client maps to `AttendanceRecord` / `attendanceOutboxSync.pushPendingAttendanceOutbox`.
        Production target is DataLink 3.0 batch ingest (config swap only).
      security:
        - DeviceJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                records:
                  type: array
                  items:
                    type: object
                    required: [worker_id, site_id, device_id, auth_timestamp]
                    properties:
                      worker_id:
                        type: string
                        format: uuid
                      site_id:
                        type: string
                        format: uuid
                      device_id:
                        type: string
                        format: uuid
                      supervisor_id:
                        type: string
                        format: uuid
                      supervisor_confirmed:
                        type: boolean
                      confidence_score:
                        type: number
                      auth_tier:
                        type: string
                        enum: [high, medium, low]
                      liveness_passed:
                        type: boolean
      responses:
        '201':
          description: Records inserted

  /push-to-integration:
    post:
      summary: "[STUB] Push attendance to NHAI DataLink 3.0"
      description: |
        Stub endpoint for future DataLink 3.0 / NHAI portal push.
        Defined in integration service layer (src/services/integration/).
        Not live — activate by setting INTEGRATION_API_KEY in .env.
      security:
        - AdminJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                attendance_records:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Push acknowledged (stub)
        '501':
          description: Integration not configured
