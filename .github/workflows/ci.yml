name: CI

on:
  push:
    branches: [main, ml-v1]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # no cache: lock file not committed (RN native project, large binary deps)

      - name: Install dependencies
        run: npm install --ignore-scripts --legacy-peer-deps
        # --ignore-scripts: skips postinstall native build steps (not needed for lint/typecheck)
        # --legacy-peer-deps: RN ecosystem has peer dep conflicts across packages

      - name: Lint
        run: npm run lint
        continue-on-error: true
        # TODO (Aahil/Maulik — Day 3): remove continue-on-error once src/ screens are written

      - name: Typecheck
        run: npm run typecheck
        continue-on-error: true
        # TODO (Aahil/Maulik — Day 3): remove continue-on-error once tsconfig paths are wired

      # TODO (Anoushka — Day 4): Add test step once benchmark harness is written
      # - name: Tests
      #   run: npm test
